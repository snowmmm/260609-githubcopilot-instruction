<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポモドーロタイマー</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="app-wrapper">
    <div class="card">
      <div class="card-titlebar">
        <span class="card-title">ポモドーロタイマー</span>
        <div class="card-controls">
          <span>－</span>
          <span>□</span>
          <span>×</span>
        </div>
      </div>

      <div class="mode-label">作業中</div>

      <div class="timer-container">
        <svg class="progress-ring" viewBox="0 0 200 200">
          <circle class="progress-ring__track" cx="100" cy="100" r="80" />
          <circle class="progress-ring__fill" cx="100" cy="100" r="80" />
        </svg>
        <div class="timer-display">25:00</div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary">開始</button>
        <button class="btn btn-secondary">リセット</button>
      </div>

      <div class="stats-panel">
        <div class="stats-title">今日の進捗</div>
        <div class="stats-body">
          <div class="stat-item">
            <span class="stat-value">0</span>
            <span class="stat-label">完了</span>
          </div>
          <div class="stat-item accent">
            <span class="stat-value">0分</span>
            <span class="stat-label">集中時間</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
